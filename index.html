.vital-main-unit { font-size: 14px; color: #94a3b8; margin-left: 6px; font-weight: 600; letter-spacing: -0.01em; }
.vital-progress { height: 5px; border-radius: 99px; background: #f1f5f9; overflow: hidden; margin-top: 4px; }
.vital-progress-fill { height: 100%; border-radius: 99px; background: #10b981; width: 0; animation: vital-fill-in 0.6s ease-out forwards; transition: background 0.2s; }

.vital-sub b { color: #1e293b; font-weight: 700; }

/* [v1.8 P1 B4] Hero Donut SVG — score-ring을 SVG circle stroke로 교체 (deps 無) */
.score-donut { width: 124px; height: 124px; position: relative; }
.score-donut svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.score-donut .donut-track { fill: none; stroke: rgba(255,255,255,0.16); stroke-width: 12; }

.score-donut.watch .donut-fill { stroke: #f59e0b; }
.score-donut.risk .donut-fill { stroke: #ef4444; }
.score-donut-text { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }

onst [open, setOpen] = useState(false);\n  const [tdeeOpen, setTdeeOpen] = useState(false);\n  const [profile, setProfile] = useState(DEFAULT_BODY_PROFILE);\n  useEffect(() => { setProfile(loadProfile()); }, []);\n  const update = (k, v) => { const next = { ...targets, [k]: Number(v) || 0 }; setTargets(next); saveTargets(next); };\n  const reset = () => { setTargets(DEFAULT_DIET_TARGETS); saveTargets(DEFAULT_DIET_TARGETS); };\n  const updateProfile = (k, v) => { const next = { ...profile, [k]: k === 'sex' ? v : (Number(v) || 0) }; setProfile(next); saveProfile(next); };\n\n  const tdeeKg = currentWeight || 75;\n  const bmr = computeBMR(tdeeKg, profile.height, profile.age, profile.sex);\n  const tdee = Math.round(bmr * profile.activity);\n  const recProt = Math.round(tdeeKg * 2.0);\n  const recommendations = [\n    { mode: '컷팅 -400', kcal: Math.max(1200, tdee - 400) },\n    { mode: '유지', kcal: tdee },\n    { mode: '벌크 +300', kcal: tdee + 300 }\n  ];\n  const applyTarget = (kcal) => { const next = { ...targets, kcal, prot: recProt }; setTargets(next); saveTargets(next); };\n\n  return (\n    <div className=\"card\">\n      <div className=\"card-title\" onClick={() => setOpen(o => !o)} style={CLICKABLE_STYLE}>⚙️ 식단 목표 설정 {open ? '▼' : '▶'}</div>\n      <div className=\"card-sub\">현재: kcal {targets.kcal} · 단백 {targets.prot}g · 탄수 {targets.carb}g · 지방 {targets.fat}g · 브라우저 localStorage 영구 저장</div>\n      {open && (<>\n        <div className=\"field-row four\">\n          <div className=\"field\"><label>kcal</label><input type=\"number\" value={targets.kcal} onChange={e => update('kcal', e.target.value)} /></div>\n          <div className=\"field\"><label>단백 g</label><input type=\"number\" value={targets.prot} onChange={e => update('prot', e.target.value)} /></div>\n          <div className=\"field\"><label>탄수 g</label><input type=\"number\" value={targets.carb} onChange={e => update('carb', e.target.value)} /></div>\n          <div className=\"field\"><label>지방 g</label>      <div className=\"row\"><span className=\"lbl\">권장 단백질</span><span className=\"val\">{recProt}g (체중×2.0)</span></div>\n            </div>\n            <div className=\"btn-row\" style={WRAP_BUTTON_ROW_STYLE}>\n              {recommendations.map(r => (\n                <button key={r.mode} className=\"btn secondary\" onClick={() => applyTarget(r.kcal)}>{r.mode} → {r.kcal}kcal 적용</button>\n              ))}\n            </div>\n          </>)}\n        </div>\n      </>)}\n    </div>\n  );\n});\n\n// =================== [v1.6] BulkDietQuickInput v2 — SKILL 연동 강화 ===================\n// 한 끼 N개 메뉴를 한 번에 Diet_DB에 등록. 형식: 메뉴명 / kcal / 단백 / 탄수 / 지방 / [구성]\n// v1.6: [F1] 검증 게이트 + [F2] 일일 목표 % + [F3] 최근 메뉴 칩 + [F4] 템플릿 + [F5] SKILL 안내\n// [SKILL]_식단_일괄입력 v1.0 모드 2 구현. 모드 1·3은 Notion AI 채팅 또는 Phase 2에서.\n// [v1.7 A2] React.memo — 부모 Dashboard setState 시 props 동일하면 재렌더 skip\nconst BulkDietQuickInput = memo(function BulkDietQuickInput({ diet, activeTargets }) {\n  const [open, setOpen] = useState(false);\n  const [date, setDate] = useState(todayISO());\n  const [slot, setSlot] = useState('오후');\n  const [text, setText] = useState('');\n  const [saving, setSaving] = useState(false);\n  const [status, setStatus] = useState(null);\n  const [confirmedHigh, setConfirmedHigh] = useState(false);\n\n  const items = useMemo(() => {\n    return text.split('\\n').map(l => l.trim()).filter(l => l && !l.startsWith('#')).map(line => {\n      const parts = line.split('/').map(p => p.trim());\n      return {\n        name: parts[0] || null,\n        kcal: Number(parts[1]) || 0,\n        prot: Number(parts[2]) || 0,\n        carb: Number(parts[3]) || 0,\n        fat: Number(parts[4]) || 0,\n        composition: parts[5] || ''\n      };\n    }).filter(item => item.name);\n  }, [text]);\n\n  const totals = useMemo(() => items.reduce((a, i) => ({\n    kcal: a.kcal + i.kcal, prot: a.prot + i.prot, carb: a.carb + i.carb, fat: a.fat + i.fat\n  }), { kcal: 0, prot: 0, carb: 0, fat: 0 }), [items]);\n\n  // [v1.6 F1] 검증 게이트 — SKILL 절대금지 #2 매핑\n  const gate = useMemo(() => {\n    const reasons = [];\n    if (items.length >= 4) reasons.push(`메뉴 ${items.length}개 (≥4)`);\n    if (totals.kcal >= 1500) reasons.push(`${Math.round(totals.kcal)}kcal (≥1500)`);\n    if (totals.prot >= 30) reasons.push(`단백 ${Math.round(totals.prot)}g (≥30)`);\n    return { triggered: reasons.length > 0, reasons };\n  }, [items.length, totals.kcal, totals.prot]);\n\n  // [v1.6 F2] 일일 누적 — 오늘 이미 입력된 끼니 + 이번 일괄 입력\n  // [v1.7 S2] open 가드 — 카드 닫힘 시 diet 필터/reduce skip\n  const dailyAccum = useMemo(() => {\n    if (!open) return { kcalAfter: 0, protAfter: 0, kcalPct: 0, protPct: 0, existingKcal: 0 };\n    const dayDiet = (diet || []).filter(d => d.date === date);\n    const existing = dayDiet.reduce((a, d) => ({ kcal: a.kcal + (d.kcal || 0), prot: a.prot + (d.prot || 0) }), { kcal: 0, prot: 0 });\n    return {\n      kcalAfter: existing.kcal + totals.kcal,\n      protAfter: existing.prot + totals.prot,\n      kcalPct: activeTargets && activeTargets.kcal ? Math.round((existing.kcal + totals.kcal) / activeTargets.kcal * 100) : 0,\n      protPct: activeTargets && activeTargets.prot ? Math.round((existing.prot + totals.prot) / activeTargets.prot * 100) : 0,\n      existingKcal: existing.kcal\n    };\n  }, [diet, date, totals, activeTargets, open]);\n\n  // [v1.6 F3] 최근 30일 메뉴 + 평균 영양소 — 클릭 시 한 줄 자동 추가\n  // [v1.7 S2] open 가드 — 가장 큰 비용 (diet 전체 순회 + Map 빌드 + sort) 카드 닫힘 시 skip\n  const recentMenus = useMemo(() => {\n    if (!open) return [];\n    const cutoff = dateDaysAgo(30);\n    const map = new Map();\n    (diet || []).filter(d => d.date >= cutoff && d.name && d.kcal > 0).forEach(d => {\n      const key = d.name;\n      const cur = map.get(key) || { name: key, kcal: 0, prot: 0, carb: 0, fat: 0, count: 0 };\n      cur.kcal += d.kcal || 0;\n      cur.prot += d.prot || 0;\n      cur.carb += d.carb || 0;\n      cur.fat += d.fat || 0;\n      cur.count += 1;\n      map.set(key, cur);\n    });\n    return Array.from(map.values())\n      .map(m => ({\n        name: m.name,\n        kcal: Math.round(m.kcal / m.count),\n        prot: Math.round(m.prot / m.count),\n        carb: Math.round(m.carb / m.count),\n        fat: Math.round(m.fat / m.count * 10) / 10,\n        count: m.count\n      }))\n      .sort((a, b) => b.count - a.count)\n      .slice(0, 12);\n  }, [diet, open]);\n\n  const addMenuLine = (m) => {\n    const newLine = `${m.name} / ${m.kcal} / ${m.prot} / ${m.carb} / ${m.fat}`;\n    setText(prev => prev ? `${prev}\\n${newLine}` : newLine);\n  };\n  const insertTemplate = () => {\n    const tmpl = '# 형식: 메뉴명 / kcal / 단백 / 탄수 / 지방 / [구성]\\n흰쌀밥 1공기 / 310 / 5 / 68 / 0.5\\n닭가슴살 100g / 110 / 23 / 0 / 1.5';\n    setText(prev => prev ? `${prev}\\n${tmpl}` : tmpl);\n  };\n\n  const submit = async () => {\n    if (!DIET_DB_ID) { setStatus({ kind: 'error', msg: '⚠️ DIET_DB_ID 미설정 — 코드 상단에 32자 hex 입력 필요' }); return; }\n    if (items.length === 0) { setStatus({ kind: 'error', msg: '⚠️ 형식 오류 — 한 줄당: 메뉴명 / kcal / 단백 / 탄수 / 지방 / [구성]' }); return; }\n    if (gate.triggered && !confirmedHigh) { setStatus({ kind: 'error', msg: `⚠️ 검증 게이트 — ${gate.reasons.join(', ')} · 아래 \"확인 후 진행\" 체크 필요` }); return; }\n    setSaving(true);\n    setStatus(null);\n    const results = await Promise.all(items.map(item => createPage(DIET_DB_ID, {\n      '식단명': propTitle(item.name),\n      '구성': propText(item.composition),\n      '칼로리': propNumber(item.kcal),\n      '단백질_g': propNumber(item.prot),\n      '탄수화물': propNumber(item.carb),\n      '지방': propNumber(item.fat),\n      '날짜': propDate(date),\n      '오전/오후/퇴근': propSelect(slot),\n      '상태': propStatus('완료'),\n      '체크박스': { checkbox: true }\n    })));\n    const ok = results.filter(r => r && !r.error).length;\n    setSaving(false);\n    const overMsg = activeTargets && activeTargets.kcal && dailyAccum.kcalAfter > activeTargets.kcal\n      ? ` · ⚠️ 일일 목표 +${Math.round(dailyAccum.kcalAfter - activeTargets.kcal)}kcal 초과`\n      : '';\n    setStatus({\n      kind: ok === items.length ? 'success' : 'error',\n      msg: `✅ ${ok}/${items.length}건 저장 — 합계 ${Math.round(totals.kcal)}kcal · 단${Math.round(totals.prot)}g · 탄${Math.round(totals.carb)}g · 지${Math.round(totals.fat)}g${overMsg}`\n    });\n    if (ok > 0) {\n      setText('');\n      setConfirmedHigh(false);\n      // [v1.7 A1] 직접 dispatchEvent 제거 — createPage 내 notifyDataChanged가 N건 debounce 통합 처리\n    }\n  };\n\n  return (\n    <div className=\"card\">\n      <div className=\"card-title\" onClick={() => setOpen(o => !o)} style={CLICKABLE_STYLE}>🚀 식단 일괄 입력 (한 끼 N개 메뉴 한 번에) {open ? '▼' : '▶'}</div>\n      <div className=\"card-sub\">한 줄당 1메뉴 · 형식: <code>메뉴명 / kcal / 단백 / 탄수 / 지방 / [구성]</code> · Diet_DB에 N개 행 동시 INSERT · <strong>[SKILL]_식단_일괄입력 v1.0</strong> 모드 2 구현</div>\n      {open && (<>\n        <div className=\"field-row two\">\n          <div className=\"field\"><label>날짜</label><input type=\"date\" value={date} onChange={e => setDate(e.target.value)} /></div>\n          <div className=\"field\"><label>시간대</label><select value={slot} onChange={e => setSlot(e.target.value)}>{TIME_SLOTS.map(s => <option key={s} value={s}>{s}</option>)}</select></div>\n        </div>\n\n        {recentMenus.length > 0 && (\n          <div className=\"field\">\n            <label>📌 최근 30일 메뉴 빠른 추가 ({recentMenus.length})</label>\n            <div className=\"chips\">\n              {recentMenus.map(m => (\n                <span key={m.name} className=\"chip-opt\" onClick={() => addMenuLine(m)} title={`${m.kcal}kcal · 단${m.prot}g · ${m.count}회 입력`}>+ {m.name}</span>\n              ))}\n            </div>\n          </div>\n        )}\n\n        <div className=\"field\">\n          <label>메뉴 목록 (한 줄당 1개 · # 시작 줄은 무시)</label>\n          <textarea value={text} onChange={e => setText(e.target.value)} rows={6} placeholder={'예시:\\n김치찌개 / 600 / 30 / 70 / 15 / 외식\\n공깃밥 / 300 / 5 / 65 / 1\\n계란말이 / 200 / 14 / 2 / 14'} style={Object.assign({}, { fontFamily: 'ui-monospace, monospace', fontSize: 13 })} />\n          <div style={Object.assign({}, { display: 'flex', gap: 6, marginTop: 4 })}>\n            <button className=\"btn secondary\" style={Object.assign({}, { padding: '4px 10px', fontSize: 11 })} onClick={insertTemplate}>📋 템플릿 삽입</button>\n            <button className=\"btn secondary\" style={Object.assign({}, { padding: '4px 10px', fontSize: 11 })} onClick={() => setText('')} disabled={!text}>🗑️ 비우기</button>\n          </div>\n        </div>\n\n        {items.length > 0 && (\n          <div className=\"preview-box\">\n            <div className=\"row\"><span className=\"lbl\">파싱 결과</span><span className=\"val\">{items.length}개 메뉴</span></div>\n            <div className=\"row\"><span className=\"lbl\">끼니 합계</span><span className=\"val\">{Math.round(totals.kcal)}kcal · 단{Math.round(totals.prot)}g · 탄{Math.round(totals.carb)}g · 지{Math.round(totals.fat)}g</span></div>\n            {activeTargets && activeTargets.kcal > 0 && (\n              <div className=\"row\"><span className=\"lbl\">일일 누적</span><span className=\"val\">{Math.round(dailyAccum.kcalAfter)}/{activeTargets.kcal}kcal ({dailyAccum.kcalPct}%) · 단{Math.round(dailyAccum.protAfter)}/{activeTargets.prot}g ({dailyAccum.protPct}%){dailyAccum.existingKcal > 0 ? ` · 기존 ${Math.round(dailyAccum.existingKcal)}kcal 포함` : ''}</span></div>\n            )}\n          </div>\n        )}\n\n        {gate.triggered && (\n          <div className=\"preview-box\" style={Object.assign({}, { borderColor: '#f59e0b', background: '#fffbeb' })}>\n            <div className=\"row\"><span className=\"lbl\" style={Object.assign({}, { color: '#92400e' })}>⚠️ 검증 게이트</span><span className=\"val\" style={Object.assign({}, { color: '#92400e' })}>{gate.reasons.join(' / ')}</span></div>\n            <label style={Object.assign({}, { display: 'flex', alignItems: 'center', gap: 8, marginTop: 8, fontSize: 12, color: '#78350f', cursor: 'pointer' })}>\n              <input type=\"checkbox\" checked={confirmedHigh} onChange={e => setConfirmedHigh(e.target.checked)} />\n              <span>분해 결과 확인 후 진행 (SKILL 절대금지 #2 매핑)</span>\n            </label>\n          </div>\n        )}\n\n        {status && (\n          <div className=\"preview-box\" style={Object.assign({}, { borderColor: status.kind === 'success' ? '#10b981' : '#ef4444', background: status.kind === 'success' ? '#f0fdf4' : '#fef2f2' })}>{status.msg}</div>\n        )}\n\n        <div className=\"btn-row\">\n          <button className=\"btn primary\" onClick={submit} disabled={saving || items.length === 0 || (gate.triggered && !confirmedHigh)}>{saving ? `${items.length}건 저장 중...` : `🚀 ${items.length || 0}건 일괄 저장`}</button>\n        </div>\n\n        <details style={Object.assign({}, { marginTop: 12, padding: 12, background: '#f8fafc', borderRadius: 8, fontSize: 12, color: '#475569' })}>\n          <summary style={Object.assign({}, { cursor: 'pointer', fontWeight: 600 })}>💡 사진/자연어로 입력하고 싶다면? (Notion AI [SKILL]_식단_일괄입력 v1.0 활용)</summary>\n          <div style={Object.assign({}, { marginTop: 8, lineHeight: 1.6 })}>\n            <strong>현재 (Code Previewer)</strong>: 모드 2 (구조화 입력)만 지원<br />\n            <strong>Notion AI 채팅</strong>에서는 모드 1 (사진) / 모드 3 (자연어)도 사용 가능:<br />\n            • 모드 1: 자비스에게 사진 + \"점심\" 같은 짧은 발화<br />\n            • 모드 3: \"점심에 김밥, 라면, 김치 먹었어\"<br />\n            <strong>Phase 2 활성화 후</strong> (Vercel + Anthropic Vision API): 본 카드에서도 사진/자연어 직접 입력 가능\n          </div>\n        </details>\n      </>)}\n    </div>\n  );\n});\n\n// =================== Today Card (UX v3) ===================\n// [v1.7 A2] React.memo — 부모 Dashboard setState 시 props 동일하면 재렌더 skip\nconst TodayCard = memo(function TodayCard({ workouts, diet, activeTargets, streaks, vitaminHabitStats, onNavigate }) {\n  const todayKey = todayISO();\n  const todayWorkout = workouts.find(w => w.date === todayKey && isCompletedWorkoutSession(w));\n  // [디렉터 요청] 오늘 단백질은 Diet_DB의 '체크박스 = true' 항목만 합산 (실제 섭취 확정분만)\n  const todayDiet = diet.filter(d => d.date === todayKey && d.checked === true).reduce((a, d) => ({ kcal: a.kcal + (d.kcal || 0), prot: a.prot + (d.prot || 0) }), { kcal: 0, prot: 0 });\n  const todayVitaminMissing = vitaminHabitStats.rows.filter(r => r.missingElapsed.includes(todayKey)).length;\n  const proteinPct = activeTargets.prot ? Math.min(999, Math.round(todayDiet.prot / activeTargets.prot * 100)) : 0;\n  const proteinGap = Math.max(0, Math.round((activeTargets.prot || 0) - todayDiet.prot));\n  return (\n    <div className=\"today-card\">\n      <div className=\"today-head\">\n        <div>\n          <div className=\"today-title\">📍 오늘 한 줄 진단 — {todayKey}</div>\n          <div className=\"today-date\">지금 무엇을 해야 하는지 즉답합니다.</div>\n        </div>\n      </div>\n      <div className=\"today-row\">\n        <div className=\"today-cell\">\n          <div className=\"today-cell-label\">🏋️ 오늘 운동</div>\n          <div className=\"today-cell-value\">{todayWorkout ? '✅ 완료' : '⏳ 미입력'}</div>\n          <div className=\"today-cell-sub\">{todayWorkout ? `${todayWorkout.main1 || todayWorkout.main2 || '유산소'} 기록 있음` : `완료 운동 streak ${streaks.workoutStreak}일`}</div>\n          {!todayWorkout && onNavigate && <button className=\"today-cta\" onClick={() => onNavigate('workout')}>운동 입력하기 →</button>}\n        </div>\n        <div className=\"today-cell\">\n          <div className=\"today-cell-label\">🥩 오늘 단백질 (체크됨만)</div>\n          <div className=\"today-cell-value\">{Math.round(todayDiet.prot)}/{activeTargets.prot}g · {proteinPct}%</div>\n          <div className=\"today-cell-sub\">{todayDiet.prot >= activeTargets.prot ? '🔥 목표 달성' : `${proteinGap}g 더 필요`}</div>\n          {todayDiet.prot < activeTargets.prot && onNavigate && <button className=\"today-cta\" onClick={() => onNavigate('diet')}>식단 입력하기 →</button>}\n        </div>\n        <div className=\"today-cell\">\n          <div className=\"today-cell-label\">🔥 streak / 💊 비타민</div>\n          <div className=\"today-cell-value\">운동 {streaks.workoutStreak}일 · 단백 {streaks.protStreak}일</div>\n          <div className=\"today-cell-sub\">{todayVitaminMissing > 0 ? `💊 비타민 ${todayVitaminMissing}종 미체크` : '💊 비타민 오늘 OK'}</div>\n        </div>\n      </div>\n    </div>\n  );\n});\n\n// =================== 대시보드 ===================\nfunction Dashboard({ workouts, diet, goals, vitamins, dietGoals, period, setPeriod, phase, setPhase, targets, setTargets, loading, loadErrors, onNavigate }) {\n  const [chartTab, setChartTab] = useState('workout');\n  // [v1.7+🅲 useDeferredValue] 탭 버튼 활성 표시는 즉각(chartTab) / 무거운 차트 영역은 다음 frame(deferredChartTab)\n  const deferredChartTab = useDeferredValue(chartTab);\n  // [v1.8 P2-A E3-dark] 다크모드 토글 — body.dark-mode + localStorage 영구\n  const [darkMode, setDarkMode] = useState(() => { try { return localStorage.getItem('darkMode_v1') === '1'; } catch { return false; } });\n  useEffect(() => { document.body.classList.toggle('dark-mode', darkMode); try { localStorage.setItem('darkMode_v1', darkMode ? '1' : '0'); } catch {} }, [darkMode]);\n  // [v1.8 P2-A D1] Vital 카드 → 차트 탭 jump + 부드러운 scrollIntoView (60ms 지연 — chartTab state 반영 후 스크롤)\n  const handleVitalClick = useCallback((tab) => { if (tab) setChartTab(tab); setTimeout(() => { const el = document.querySelector('.chart-tabs'); if (el && el.scrollIntoView) el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 60); }, []);\n  // [v1.9 D3] 회고 row 모달 — 클릭한 row 객체 보관, null 이면 닫힘\n  const [selectedReviewRow, setSelectedReviewRow] = useState(null);\n  // [v1.9 D3] 권장 액션 산출 — 지표별 휴리스틱 (운동/칼로리/단백/1RM/체중)\n  const reviewInsight = useCallback((row) => {\n    if (!row) return null;\n    const t = row.t, l = row.l;\n    if (t == null || l == null) return '데이터가 부족합니다. 일관된 입력을 이어가 주세요.';\n    const delta = Math.round((t - l) * 10) / 10;\n    if (delta === 0) return '변화 없음. 현재 패턴 유지.';\n    const k = row.k;\n    if (k === '운동 세션') return delta < 0 ? `세션이 ${Math.abs(delta)}회 감소. 이번 주 +1 세션 추가 권장.` : `세션이 ${delta}회 증가. 회복 일자 1일 확보 권장.`;\n    if (k === '평균 칼로리') return Math.abs(delta) < 100 ? '칼로리 안정 범위. 페이즈 유지.' : delta > 0 ? `+${Math.round(delta)}kcal 증가. 벌크 페이즈면 OK, 컷팅이면 재조정 필요.` : `${Math.round(delta)}kcal 감소. 단백질 100% 우선 유지.`;\n    if (k === '평균 단백질') return delta < 0 ? `단백 ${Math.abs(Math.round(delta))}g 감소. 끌니당 +${Math.ceil(Math.abs(delta) / 3)}g 증량 권장.` : `단백 +${Math.round(delta)}g 증가. 근비대 자극 양호.`;\n    if (k === '메인운동 최고 1RM' || k === '메인 1·1RM' || k === '메인 1 최고 1RM' || k === '메인 1 운동 1RM') return delta < 0 ? `1RM ${Math.abs(delta)}kg 감소. 디로드 또는 영양/수면 점검.` : `1RM +${delta}kg PR. 다음 주 미세 증량 도전.`;\n    if (k === '평균 체중') return Math.abs(delta) < 0.5 ? '체중 안정. 정상 변동 범위.' : delta > 0 ? `+${delta}kg 증가. 페이즈 목표 대비 점검.` : `${delta}kg 감소. 페이즈 목표 대비 점검.`;\n    return delta > 0 ? '상승 추세. 모멘텀 유지.' : '하락 추세. 패턴 재점검 권장.';\n  }, []);\n  const currentWeek = useMemo(() => getKstWeekRange(today), []);\n  const weekDates = useMemo(() => enumerateDates(currentWeek.start, currentWeek.end), [currentWeek]);\n  const elapsedWeekDates = useMemo(() => weekDates.filter(d => d <= todayISO()), [weekDates]);\n  const activeTargets = useMemo(() => resolveLeanMassDietTargets(dietGoals, targets), [dietGoals, targets]);\n  const since = useMemo(() => { const d = new Date(); d.setDate(d.getDate() - period); return toKstDate(d); }, [period]);\n  const fw = useMemo(() => workouts.filter(w => w.date >= since && (phase === 'all' || w.phase === phase)), [workouts, since, phase]);\n  const fd = useMemo(() => diet.filter(d => d.date >= since), [diet, since]);\n  const fv = useMemo(() => vitamins.filter(v => v.date >= since && v.type === '일일기록'), [vitamins, since]);\n\n  const main1Series = useMemo(() => {\n    const m = new Map();\n    fw.forEach(w => { if (w.main1) { const v = computeVolume(w.main1, w.m1w, w.m1s, w.m1r); if (v > 0) m.set(w.date, (m.get(w.date) || 0) + v); }});\n    return Array.from(m.entries()).sort().map(([date, vol]) => ({ date: date.slice(5), volume: vol }));\n  }, [fw]);\n  const main2Series = useMemo(() => {\n    const m = new Map();\n    fw.forEach(w => { if (w.main2) { const v = computeVolume(w.main2, w.m2w, w.m2s, w.m2r); if (v > 0) m.set(w.date, (m.get(w.date) || 0) + v); }});\n    return Array.from(m.entries()).sort().map(([date, vol]) => ({ date: date.slice(5), volume: vol }));\n  }, [fw]);\n  const cardioWeekly = useMemo(() => {\n    const m = new Map();\n    fw.forEach(w => { if (w.cardio_km > 0) { const k = weekKey(w.date); m.set(k, (m.get(k) || 0) + w.cardio_km); }});\n    return Array.from(m.entries()).sort().map(([k, km]) => ({ week: k.slice(5), km: Math.round(km * 10) / 10 }));\n  }, [fw]);\n  const calorieDaily = useMemo(() => {\n    const m = new Map();\n    fd.forEach(d => { m.set(d.date, (m.get(d.date) || 0) + (d.kcal || 0)); });\n    return Array.from(m.entries()).sort().map(([date, kcal]) => ({ date: date.slice(5), kcal }));\n  }, [fd]);\n  const proteinDaily = useMemo(() => {\n    const m = new Map();\n    fd.forEach(d => { m.set(d.date, (m.get(d.date) || 0) + (d.prot || 0)); });\n    return Array.from(m.entries()).sort().map(([date, prot]) => ({ date: date.slice(5), prot: Math.round(prot * 10) / 10 }));\n  }, [fd]);\n  // [Q5] 메인1/메인2 추정 1RM (일별 최고치)\n  const main1OneRM = useMemo(() => {\n    const m = new Map();\n    fw.forEach(w => { if (w.main1) { const e = computeOneRM(w.main1, w.m1w, w.m1r); if (e > 0) m.set(w.date, Math.max(m.get(w.date) || 0, e)); }});\n    return Array.from(m.entries()).sort().map(([date, v]) => ({ date: date.slice(5), oneRM: v }));\n  }, [fw]);\n  const main2OneRM = useMemo(() => {\n    const m = new Map();\n    fw.forEach(w => { if (w.main2) { const e = computeOneRM(w.main2, w.m2w, w.m2r); if (e > 0) m.set(w.date, Math.max(m.get(w.date) || 0, e)); }});\n    return Array.from(m.entries()).sort().map(([date, v]) => ({ date: date.slice(5), oneRM: v }));\n  }, [fw]);\n  // [Q2] 체중 추이 — 일별 첫 측정값 (시간대 정렬: 오전 우선)\n  const weightDaily = useMemo(() => {\n    const m = new Map();\n    const slotOrder = { '오전':0, '오후':1, '퇴근':2 };\n    [...fd].sort((a,b) => (slotOrder[a.slot] ?? 9) - (slotOrder[b.slot] ?? 9)).forEach(d => {\n      if (d.weight != null && !m.has(d.date)) m.set(d.date, d.weight);\n    });\n    return Array.from(m.entries()).sort().map(([date, kg]) => ({ date: date.slice(5), weight: kg }));\n  }, [fd]);\n  // [Q3] 컴플라이언스 — 칼로리 ±10% / 단백질 100%+ 달성일\n  const compliance = useMemo(() => {\n    const dayMap = new Map();\n    fd.forEach(d => { const cur = dayMap.get(d.date) || { kcal: 0, prot: 0 }; cur.kcal += d.kcal || 0; cur.prot += d.prot || 0; dayMap.set(d.date, cur); });\n    const total = dayMap.size;\n    let kcalDays = 0, protDays = 0;\n    dayMap.forEach(v => {\n      if (activeTargets.kcal && Math.abs(v.kcal - activeTargets.kcal) <= activeTargets.kcal * 0.1) kcalDays++;\n      if (activeTargets.prot && v.prot >= activeTargets.prot) protDays++;\n    });\n    return { total, kcalDays, protDays, kcalPct: total ? Math.round(kcalDays/total*100) : 0, protPct: total ? Math.round(protDays/total*100) : 0 };\n  }, [fd, activeTargets]);\n  // [Q4] Streak — 운동 연속 / 단백질 목표 연속 (오늘 미기록 시 어제부터 카운트)\n  const streaks = useMemo(() => {\n    const wDates = new Set(workouts.filter(isCompletedWorkoutSession).map(w => w.date));\n    const dProt = new Map();\n    diet.forEach(d => dProt.set(d.date, (dProt.get(d.date) || 0) + (d.prot || 0)));\n    const now = new Date();\n    const todayK = toKstDate(now);\n    let workoutStreak = 0;\n    const startW = wDates.has(todayK) ? 0 : 1;\n    for (let i = startW; i < 365; i++) { const d = new Date(now); d.setDate(d.getDate() - i); if (wDates.has(toKstDate(d))) workoutStreak++; else break; }\n    let protStreak = 0;\n    const startP = (dProt.get(todayK) || 0) >= activeTargets.prot ? 0 : 1;\n    for (let i = startP; i < 365; i++) { const d = new Date(now); d.setDate(d.getDate() - i); if ((dProt.get(toKstDate(d)) || 0) >= activeTargets.prot) protStreak++; else break; }\n    return { workoutStreak, protStreak };\n  }, [workouts, diet, activeTargets]);\n  // [M1] 주간 회고 — 이번주(최근 7일) vs 지난주(그 전 7일)\n  const weeklyReview = useMemo(() => {\n    const dt = (n) => toKstDate(new Date(Date.now() - n * 86400000));\n    const w0 = dt(7), w1 = dt(14);\n    const tWk = workouts.filter(w => w.date >= w0 && isCompletedWorkoutSession(w));\n    const lWk = workouts.filter(w => w.date >= w1 && w.date < w0 && isCompletedWorkoutSession(w));\n    const tDt = diet.filter(d => d.date >= w0);\n    const lDt = diet.filter(d => d.date >= w1 && d.date < w0);\n    const summarize = (ws, ds) => {\n      const days = new Set(ds.map(x => x.date)).size || 1;\n      const oneRMs = ws.map(w => computeOneRM(w.main1, w.m1w, w.m1r)).filter(x => x > 0);\n      const weights = ds.filter(x => x.weight != null).map(x => x.weight);\n      return {\n        sessions: ws.length,\n        avgKcal: Math.round(ds.reduce((s,x) => s+(x.kcal||0), 0) / days),\n        avgProt: Math.round(ds.reduce((s,x) => s+(x.prot||0), 0) / days),\n        maxOneRM: oneRMs.length ? Math.max(...oneRMs) : 0,\n        avgWeight: weights.length ? Math.round(weights.reduce((a,b) => a+b, 0) / weights.length * 10)/10 : null\n      };\n    };\n    return { thisWeek: summarize(tWk, tDt), lastWeek: summarize(lWk, lDt) };\n  }, [workouts, diet]);\n  const currentWeight = weightDaily.length ? weightDaily[weightDaily.length - 1].weight : null;\n  const pfc = useMemo(() => {\n    if (fd.length === 0) return [];\n    const days = new Set(fd.map(d => d.date)).size || 1;\n    const sum = fd.reduce((a, d) => ({ carb: a.carb + (d.carb || 0), prot: a.prot + (d.prot || 0), fat: a.fat + (d.fat || 0) }), { carb:0, prot:0, fat:0 });\n    const cKcal = sum.carb / days * 4;\n    const pKcal = sum.prot / days * 4;\n    const fKcal = sum.fat / days * 9;\n    return [{ name:'탄수', value: Math.round(cKcal) }, { name:'단백', value: Math.round(pKcal) }, { name:'지방', value: Math.round(fKcal) }];\n  }, [fd]);\n  // [Q5] 기록 기반 다음 PR 도전 — 역대 최고 1RM × 1.05 대비 최신 1RM\n  const goalProgress = useMemo(() => {\n    if (main1OneRM.length === 0) return [{ name:'달성률', value: 0, fill: PALETTE.indigo }];\n    const peak = Math.max(...main1OneRM.map(x => x.oneRM));\n    const target = peak * 1.05;\n    const latest = main1OneRM[main1OneRM.length - 1].oneRM;\n    const pct = target > 0 ? Math.min(100, Math.round(latest / target * 100)) : 0;\n    return [{ name:'달성률', value: pct, fill: pct >= 100 ? PALETTE.green : PALETTE.indigo }];\n  }, [main1OneRM]);\n\n  const kpi = useMemo(() => {\n    const totalWorkouts = fw.filter(isCompletedWorkoutSession).length;\n    const totalKm = Math.round(fw.reduce((s, w) => s + (w.cardio_km || 0), 0) * 10) / 10;\n    const days = new Set(fd.map(d => d.date)).size || 1;\n    const avgKcal = Math.round(fd.reduce((s, d) => s + (d.kcal || 0), 0) / days);\n    const avgProt = Math.round(fd.reduce((s, d) => s + (d.prot || 0), 0) / days);\n    // [v1.5 F1] 진짜 이번주(KST 월~일) 윈도우 — \"이번 주 진단\" 라벨 정합성 보장\n    const wkWorkouts = workouts.filter(w => w.date >= currentWeek.start && w.date <= currentWeek.end && isCompletedWorkoutSession(w));\n    const wkDiet = diet.filter(d => d.date >= currentWeek.start && d.date <= currentWeek.end);\n    const wkDietDays = new Set(wkDiet.map(d => d.date)).size || 1;\n    const weekWorkouts = wkWorkouts.length;\n    const weekCardioKm = Math.round(wkWorkouts.reduce((s, w) => s + (w.cardio_km || 0), 0) * 10) / 10;\n    const weekAvgKcal = Math.round(wkDiet.reduce((s, d) => s + (d.kcal || 0), 0) / wkDietDays);\n    const weekAvgProt = Math.round(wkDiet.reduce((s, d) => s + (d.prot || 0), 0) / wkDietDays);\n    return { totalWorkouts, totalKm, avgKcal, avgProt, weekWorkouts, weekCardioKm, weekAvgKcal, weekAvgProt, weeklyCardioTarget: 7 };\n  }, [fw, fd, workouts, diet, currentWeek]);\n  const goalStats = useMemo(() => {\n    const actualByName = new Map();\n    fw.filter(isCompletedWorkoutSession).forEach(w => {\n      if (w.main1) actualByName.set(w.main1, Math.max(actualByName.get(w.main1) || 0, computeVolume(w.main1, w.m1w, w.m1s, w.m1r)));\n      if (w.main2) actualByName.set(w.main2, Math.max(actualByName.get(w.main2) || 0, computeVolume(w.main2, w.m2w, w.m2s, w.m2r)));\n    });\n    const rows = goals.map(g => {\n      const actual = actualByName.get(g.name) || 0;\n      const rate = g.targetVolume ? Math.round(actual / g.targetVolume * 100) : 0;\n      return { ...g, actual, rate };\n    });\n    const matched = rows.filter(r => r.actual > 0 && r.targetVolume > 0);\n    const avgRate = matched.length ? Math.round(matched.reduce((s, r) => s + r.rate, 0) / matched.length) : 0;\n    return { rows, matchedCount: matched.length, avgRate, missingCount: rows.filter(r => !r.targetVolume).length };\n  }, [goals, fw]);\n  const vitaminStats = useMemo(() => {\n    const total = fv.length;\n    const done = fv.filter(isVitaminCompleted).length;\n    const rate = total ? Math.round(done / total * 100) : 0;\n    const missed = fv.filter(v => !isVitaminCompleted(v)).slice(0, 8);\n    return { total, done, rate, missed };\n  }, [fv]);\n  const vitaminHabitStats = useMemo(() => {\n    const sourceNames = Array.from(new Set(vitamins.filter(v => v.type === '일일기록' && v.name).map(v => v.name))).sort();\n    const rows = sourceNames.map(name => {\n      const doneDates = new Set(vitamins.filter(v => v.name === name && v.date >= currentWeek.start && v.date <= currentWeek.end && isVitaminCompleted(v)).map(v => v.date));\n      const missingElapsed = elapsedWeekDates.filter(d => !doneDates.has(d));\n      return { name, doneCount: weekDates.filter(d => doneDates.has(d)).length, missingElapsed };\n    });\n    const required = rows.length * elapsedWeekDates.length;\n    const doneToDate = rows.reduce((s, r) => s + (elapsedWeekDates.length - r.missingElapsed.length), 0);\n    const perfectToDate = rows.filter(r => r.missingElapsed.length === 0).length;\n    const fullSeven = rows.filter(r => r.doneCount === 7).length;\n    const missed = rows.filter(r => r.missingElapsed.length > 0).slice(0, 6);\n    return { names: rows.length, rows, rate: required ? Math.round(doneToDate / required * 100) : 0, perfectToDate, fullSeven, missed };\n  }, [vitamins, currentWeek, weekDates, elapsedWeekDates]);\n  const vitaminWeekGrid = useMemo(() => {\n    const todayKey = todayISO();\n    const sourceNames = Array.from(new Set(vitamins.filter(v => v.type === '일일기록' && v.name).map(v => v.name))).sort();\n    return sourceNames.map(name => ({\n      name,\n      cells: weekDates.map(date => ({\n        date,\n        isPast: date <= todayKey,\n        isDone: vitamins.some(v => v.name === name && v.date === date && isVitaminCompleted(v))\n      }))\n    }));\n  }, [vitamins, weekDates]);\n  const latestDate = (arr) => arr.map(x => x.date).filter(Boolean).sort().at(-1) || '기록 없음';\n  const coach = useMemo(() => {\n    const weekWorkouts = workouts.filter(w => w.date >= currentWeek.start && w.date <= currentWeek.end && isCompletedWorkoutSession(w));\n    const workoutRate = clamp(pct(weekWorkouts.length, DEFAULT_WEEKLY_WORKOUT_TARGET), 0, 140);\n\n    const dayMap = new Map();\n    diet.filter(d => d.date >= currentWeek.start && d.date <= currentWeek.end).forEach(d => {\n      const cur = dayMap.get(d.date) || { kcal: 0, prot: 0 };\n      cur.kcal += d.kcal || 0;\n      cur.prot += d.prot || 0;\n      dayMap.set(d.date, cur);\n    });\n    const dietDays = Array.from(dayMap.values());\n    const proteinDays = dietDays.filter(d => activeTargets.prot && d.prot >= activeTargets.prot).length;\n    const kcalGoodDays = dietDays.filter(d => activeTargets.kcal && Math.abs(d.kcal - activeTargets.kcal) <= activeTargets.kcal * 0.1).length;\n    const proteinRate = clamp(pct(proteinDays, elapsedWeekDates.length || 7), 0, 100);\n    const kcalRate = clamp(pct(kcalGoodDays, elapsedWeekDates.length || 7), 0, 100);\n\n    const todayKey = todayISO();\n    // [디렉터 요청] 오늘 단백질은 Diet_DB의 '체크박스 = true' 항목만 합산 (실제 섭취 확정분만)\n  const todayDiet = diet.filter(d => d.date === todayKey && d.checked === true).reduce((a, d) => ({ kcal: a.kcal + (d.kcal || 0), prot: a.prot + (d.prot || 0) }), { kcal: 0, prot: 0 });\n    const proteinGap = Math.max(0, Math.round((activeTargets.prot || 0) - todayDiet.prot));\n    const workoutGap = Math.max(0, DEFAULT_WEEKLY_WORKOUT_TARGET - weekWorkouts.length);\n    const vitaminRate = clamp(vitaminHabitStats.rate || 0, 0, 100);\n    const goalRate = clamp(goalStats.avgRate || 0, 0, 100);\n\n    const score = Math.round(\n      clamp(workoutRate, 0, 100) * 0.35 +\n      proteinRate * 0.25 +\n      kcalRate * 0.2 +\n      vitaminRate * 0.1 +\n      goalRate * 0.1\n    );\n    const tone = toneClass(score);\n    const verdict = score >= 85 ? '안정권. 오늘은 기록만 빠뜨리지 마세요.'\n      : score >= 70 ? '흐름 양호. 부족한 한 가지만 채우면 한 단계 위입니다.'\n      : score >= 50 ? '주의. 오늘 단 하나라도 끝내면 회복됩니다.'\n      : '위험. 지금 운동 또는 단백질 중 하나를 즉시 처리하세요.';\n\n    const actions = [];\n    if (workoutGap > 0) actions.push({ text: `이번 주 운동 목표까지 ${workoutGap}회 남았습니다.`, tab: 'workout' });\n    if (proteinGap > 0) actions.push({ text: `오늘 단백질 ${proteinGap}g 추가가 필요합니다.`, tab: 'diet' });\n    if (vitaminHabitStats.missed.length > 0) actions.push({ text: `이번 주 누락 비타민 ${vitaminHabitStats.missed.length}종을 확인하세요.`, tab: null });\n    if (goalStats.matchedCount < goals.length) actions.push({ text: `운동 목표 매칭 ${goals.length - goalStats.matchedCount}개를 점검하세요.`, tab: 'workout' });\n    if (actions.length === 0) actions.push({ text: '오늘은 유지 전략입니다. 기록만 누락 없이 남기면 됩니다.', tab: null });\n\n    const facts = [\n      `이번 주(${currentWeek.start}~${currentWeek.end}) 완료 운동 ${weekWorkouts.length}/${DEFAULT_WEEKLY_WORKOUT_TARGET}회`,\n      `이번 주 단백질 목표 달성 ${proteinDays}/${elapsedWeekDates.length}일`,\n      `이번 주 칼로리 목표 근접 ${kcalGoodDays}/${elapsedWeekDates.length}일`,\n      `비타민 무결성 ${vitaminHabitStats.perfectToDate}/${vitaminHabitStats.names}종 오늘까지 무누락`,\n      `린매스업 식단 목표 ${activeTargets.sourceCount}건 반영`,\n      `운동 목표 매칭 ${goalStats.matchedCount}/${goals.length}개`\n    ];\n\n    return { score, tone, verdict, workoutRate, proteinRate, kcalRate, vitaminRate, goalRate, actions, facts, weekWorkouts: weekWorkouts.length, proteinDays, kcalGoodDays };\n  }, [workouts, diet, activeTargets, vitaminHabitStats, goalStats, goals.length, currentWeek, elapsedWeekDates]);\n\n  // [v1.9 P3-2] 부위별 주간 진척 — 월~일 KST 윈도우, multi-부위 row는 각 부위에 동일 가산 (Q2=A)\n  const bodypartProgress = useMemo(() => {\n    const startD = new Date(currentWeek.start);\n    startD.setDate(startD.getDate() - 7);\n    const lastWeek = { start: toKstDate(startD), end: toKstDate(new Date(startD.getTime() + 6 * 86400000)) };\n    const sumByPart = (start, end) => {\n      const acc = { '가슴': 0, '등': 0, '어깨': 0, '하체': 0 };\n      workouts.forEach(w => {\n        if (!w.date || w.date < start || w.date > end) return;\n        const v = computeVolume(w.main1, w.m1w, w.m1s, w.m1r) + computeVolume(w.main2, w.m2w, w.m2s, w.m2r);\n        if (v <= 0) return;\n        (w.parts || []).forEach(p => { if (acc[p] != null) acc[p] += v; });\n      });\n      return acc;\n    };\n    const cardioByRange = (start, end) => {\n      let km = 0, minutes = 0;\n      workouts.forEach(w => {\n        if (!w.date || w.date < start || w.date > end) return;\n        km += w.cardio_km || 0;\n        minutes += w.cardio_min || 0;\n      });\n      return { km: Math.round(km * 10) / 10, minutes: Math.round(minutes) };\n    };\n    const thisVol = sumByPart(currentWeek.start, currentWeek.end);\n    const lastVol = sumByPart(lastWeek.start, lastWeek.end);\n    const thisCardio = cardioByRange(currentWeek.start, currentWeek.end);\n    const lastCardio = cardioByRange(lastWeek.start, lastWeek.end);\n    const rows = BODYPART_KEYS.map(part => {\n      const cur = thisVol[part] || 0;\n      const prev = lastVol[part] || 0;\n      const target = BODYPART_TARGETS[part] || 0;\n      const rate = target ? Math.round(cur / target * 100) : 0;\n      return { part, cur, prev, target, rate, delta: cur - prev, tone: rate >= 80 ? 'good' : rate >= 50 ? 'warn' : 'bad' };\n    });\n    const cardioRate = CARDIO_WEEKLY_TARGET.minutes ? Math.round(thisCardio.minutes / CARDIO_WEEKLY_TARGET.minutes * 100) : 0;\n    const cardio = {\n      cur: thisCardio, prev: lastCardio, target: CARDIO_WEEKLY_TARGET, rate: cardioRate,\n      deltaMin: thisCardio.minutes - lastCardio.minutes,\n      deltaKm: Math.round((thisCardio.km - lastCardio.km) * 10) / 10,\n      tone: cardioRate >= 80 ? 'good' : cardioRate >= 50 ? 'warn' : 'bad'\n    };\n    return { rows, cardio, weekRange: currentWeek, lastWeek };\n  }, [workouts, currentWeek]);\n\n  return (\n    <div>\n      <TodayCard workouts={workouts} diet={diet} activeTargets={activeTargets} streaks={streaks} vitaminHabitStats={vitaminHabitStats} onNavigate={onNavigate} />\n\n      <div className=\"filter-bar\">\n        {[7, 30, 90].map(d => <button key={d} className={'filter-chip' + (period === d ? ' active' : '')} onClick={() => setPeriod(d)}>{d}일</button>)}\n        <select className=\"filter-sel\" value={phase} onChange={e => setPhase(e.target.value)}>\n          <option value=\"all\">매크로 페이즈: 전체</option>\n          {MACRO_PHASES.map(p => <option key={p} value={p}>{p}</option>)}\n        </select>\n        <button className=\"dark-toggle\" onClick={() => setDarkMode(d => !d)} title=\"다크모드 토글 (localStorage 영구 저장)\">{darkMode ? '☀️ Light' : '🌙 Dark'}</button>\n      </div>\n\n      <div className={'card coach-hero ' + coach.tone}>\n        <div className=\"coach-head\">\n          {/* [v1.8 P1 B4] Score Ring → SVG Donut — 48px 800 중앙 점수 + 컬러 stroke + 자동 호 */}\n          <div className={'score-donut ' + coach.tone}>\n            <svg viewBox=\"0 0 120 120\">\n              <circle className=\"donut-track\" cx=\"60\" cy=\"60\" r=\"50\" />\n              <circle className=\"donut-fill\" cx=\"60\" cy=\"60\" r=\"50\"\n                strokeDasharray={`${2 * Math.PI * 50}`}\n                strokeDashoffset={`${2 * Math.PI * 50 * (1 - clamp(coach.score, 0, 100) / 100)}`} />\n            </svg>\n            <div className=\"score-donut-text\">\n              <div className=\"score-donut-value\">{coach.score}</div>\n              <div className=\"score-donut-label\">수행 점수</div>\n            </div>\n          </div>\n          <div>\n            <div className=\"coach-title\">이번 주 코칭 판정 — {coach.score >= 80 ? '순항' : coach.score >= 60 ? '보완 필요' : '회복 필요'}</div>\n            <div className=\"coach-subtitle\">{coach.verdict}<br />기준 주간: 월요일 {currentWeek.start} 시작 · 일요일 {currentWeek.end} 종료 · 세부 진단은 아래 <strong>Vital Signs 4-카드</strong> 참고</div>\n          </div>\n        </div>\n        {/* [v1.8 P1 B3] coach-grid 4-metric 제거 — Vital Signs와 중복 → Hero는 점수+판정+Fact/Action만 */}\n        <div className=\"coach-panels\">\n          <div className=\"insight-panel dark\">\n            <div className=\"insight-title\">📌 Fact Check</div>\n            <ul className=\"insight-list\">{coach.facts.map(f => <li key={f}>{f}</li>)}</ul>\n          </div>\n          <div className=\"insight-panel dark\">\n            <div className=\"insight-title\">🎯 Today Action</div>\n            <div className=\"action-list\">{coach.actions.map((a, i) => <div key={i} className={'action-item' + (a.tab ? ' clickable' : '')} onClick={() => a.tab && onNavigate && onNavigate(a.tab)}><span>{a.text}</span>{a.tab && <span className=\"action-item-arrow\">입력 →</span>}</div>)}</div>\n          </div>\n        </div>\n      </div>\n\n      <details className=\"card source-details\">\n        <summary className=\"source-summary\">🔗 데이터 출처 / DB 연결 상태 보기</summary>\n        <div className=\"card-title\">샘플 데이터 0개</div>\n        <div className=\"card-sub\">모든 수치는 Notion DB fetch 결과만 사용합니다. DB 미설정/권한 오류 시 가짜 데이터 대신 빈 상태를 표시합니다.</div>\n        {loading && (\n          <div>\n            <div className=\"skeleton skeleton-hero\"></div>\n            <div className=\"skeleton-grid\">\n              <div className=\"skeleton skeleton-kpi\"></div>\n              <div className=\"skeleton skeleton-kpi\"></div>\n              <div className=\"skeleton skeleton-kpi\"></div>\n              <div className=\"skeleton skeleton-kpi\"></div>\n            </div>\n            <div className=\"skeleton skeleton-card\"></div>\n          </div>\n        )}\n        {loadErrors.length > 0 && <div className=\"preview-box\">{loadErrors.map(e => <div key={e} className=\"row\"><span className=\"lbl\">확인 필요</span><span className=\"val\">{e}</span></div>)}</div>}\n        <div className=\"kpi-row\">\n          <div className=\"kpi\"><div className=\"kpi-label\">운동기록_DB</div><div className=\"kpi-value\">{workouts.length}<span className=\"kpi-unit\">건</span></div><div className=\"kpi-sub\">최근 {latestDate(workouts)}</div></div>\n          <div className=\"kpi\"><div className=\"kpi-label\">운동 목표</div><div className=\"kpi-value\">{goals.length}<span className=\"kpi-unit\">건</span></div><div className=\"kpi-sub\">최근 {latestDate(goals)}</div></div>\n          <div className=\"kpi\"><div className=\"kpi-label\">Diet_DB</div><div className=\"kpi-value\">{diet.length}<span className=\"kpi-unit\">건</span></div><div className=\"kpi-sub\">최근 {latestDate(diet)}</div></div>\n          <div className=\"kpi\"><div className=\"kpi-label\">Vitamin_DB</div><div className=\"kpi-value\">{vitamins.length}<span className=\"kpi-unit\">건</span></div><div className=\"kpi-sub\">최근 {latestDate(vitamins)}</div></div>\n          <div className=\"kpi\"><div className=\"kpi-label\">식단 목표</div><div className=\"kpi-value\">{dietGoals.length}<span className=\"kpi-unit\">건</span></div><div className=\"kpi-sub\">린매스업 {activeTargets.sourceCount}건</div></div>\n        </div>\n      </details>\n\n      {/* [v1.8 P0 B1+B2+C1] Vital Signs 4-카드 — 기존 KPI 16개 + 린매스업 카드 통폐합 + 색상 신호등 */}\n      <div className=\"section-divider\">\n        <div className=\"section-divider-title\">📊 이번 주 Vital Signs — {currentWeek.start} ~ {currentWeek.end}</div>\n        <div className=\"section-divider-sub\">한눈 진단 · 카드 상단 신호등 (🟢 80+ / 🟡 60-79 / 🔴 60-) · KST 월~일 윈도우</div>\n      </div>\n      <div className=\"vital-signs\">\n        <div className={'vital-card ' + toneClass(coach.workoutRate)} onClick={() => handleVitalClick('workout')}>\n          <div className=\"vital-label\"><span className=\"vital-icon\">🏋️</span> 운동</div>\n          <div><span className=\"vital-main\">{coach.weekWorkouts}</span><span className=\"vital-main-unit\">/ {DEFAULT_WEEKLY_WORKOUT_TARGET}회 · {coach.workoutRate}%</span></div>\n          <div className=\"vital-progress\"><div className={'vital-progress-fill ' + barTone(coach.workoutRate)} style={Object.assign({}, { width: `${clamp(coach.workoutRate, 0, 100)}%` })}></div></div>\n          <div className=\"vital-sub\">\n            <span>유산소 <b>{kpi.weekCardioKm}km</b> / 주 {kpi.weeklyCardioTarget}km</span>\n            <span>🔥 streak <b>{streaks.workoutStreak}일</b> · 목표 매칭 <b>{goalStats.matchedCount}/{goals.length}</b></span>\n            <span>목표 평균 달성률 <b>{goalStats.avgRate}%</b></span>\n          </div>\n        </div>\n\n        <div className={'vital-card ' + toneClass(coach.proteinRate)} onClick={() => handleVitalClick('diet')}>\n          <div className=\"vital-label\"><span className=\"vital-icon\">🍱</span> 식단</div>\n          <div><span className=\"vital-main\">{kpi.weekAvgProt}</span><span className=\"vital-main-unit\">/ {activeTargets.prot}g 단백 · {coach.proteinRate}%</span></div>\n          <div className=\"vital-progress\"><div className={'vital-progress-fill ' + barTone(coach.proteinRate)} style={Object.assign({}, { width: `${coach.proteinRate}%` })}></div></div>\n          <div className=\"vital-sub\">\n            <span>kcal 평균 <b>{kpi.weekAvgKcal}</b> / {activeTargets.kcal} ({activeTargets.kcal ? Math.round(kpi.weekAvgKcal / activeTargets.kcal * 100) : 0}%)</span>\n            <span>달성일 단백 <b>{compliance.protDays}/{compliance.total}</b> · kcal {compliance.kcalDays}/{compliance.total}</span>\n            <span>⚡ 단백 streak <b>{streaks.protStreak}일</b></span>\n          </div>\n        </div>\n\n        <div className={'vital-card ' + (currentWeight ? 'good' : 'neutral')} onClick={() => handleVitalClick('weight')}>\n          <div className=\"vital-label\"><span className=\"vital-icon\">⚖️</span> 체성분</div>\n          <div><span className=\"vital-main\">{currentWeight ?? '−'}</span><span className=\"vital-main-unit\">kg (최신)</span></div>\n          <div className=\"vital-sub\" style={Object.assign({}, { marginTop: 12 })}>\n            <span>최근 7일 평균 <b>{weeklyReview.thisWeek.avgWeight ?? '−'}{weeklyReview.thisWeek.avgWeight ? 'kg' : ''}</b></span>\n            <span>이전 7일 평균 <b>{weeklyReview.lastWeek.avgWeight ?? '−'}{weeklyReview.lastWeek.avgWeight ? 'kg' : ''}</b></span>\n            <span>메인1 최고 1RM <b>{weeklyReview.thisWeek.maxOneRM || 0}kg</b></span>\n          </div>\n        </div>\n\n        <div className={'vital-card ' + toneClass(coach.vitaminRate)} onClick={() => handleVitalClick('vitamin')}>\n          <div className=\"vital-label\"><span className=\"vital-icon\">💊</span> 비타민</div>\n          <div><span className=\"vital-main\">{vitaminHabitStats.perfectToDate}</span><span className=\"vital-main-unit\">/ {vitaminHabitStats.names}종 무누락</span></div>\n          <div className=\"vital-progress\"><div className={'vital-progress-fill ' + barTone(coach.vitaminRate)} style={Object.assign({}, { width: `${coach.vitaminRate}%` })}></div></div>\n          <div className=\"vital-sub\">\n            <span>주간 무결성 <b>{coach.vitaminRate}%</b></span>\n            <span>7일 완주 <b>{vitaminHabitStats.fullSeven}/{vitaminHabitStats.names}종</b></span>\n            <span>금주 누락 <b>{vitaminHabitStats.missed.length}종</b></span>\n          </div>\n        </div>\n      </div>\n\n      {/* [v1.9 P3-4] 부위별 주간 진척 5-카드 — Vital Signs 직후 (Q4=A) — 가슴/등/어깨/하체 + 유산소 분·km 듀얼 */}\n      <div className=\"section-divider\">\n        <span className=\"section-divider-title\">🎯 주간 부위별 진척</span>\n        <span className=\"section-divider-sub\">월~일 KST · 부위별 Volume(가슴/등/어깨/하체) + 유산소 분·km 듀얼 · 4주 평균 +20% 목표</span>\n      </div>\n      <div className=\"bodypart-grid\">\n        {bodypartProgress.rows.map(r => (\n          <div key={r.part} className=\"bodypart-card\">\n            <div className=\"bodypart-head\">\n              <span className=\"bodypart-name\">{r.part}</span>\n              <span className={'bodypart-rate ' + r.tone}>{r.rate}%</span>\n            </div>\n            <div className=\"bodypart-main\">{Math.round(r.cur).toLocaleString()}<span className=\"bodypart-main-target\"> / {r.target.toLocaleString()}</span></div>\n            <div className=\"bodypart-progress\"><div className={'bodypart-progress-fill ' + barTone(r.rate)} style={Object.assign({}, { width: `${Math.min(100, r.rate)}%` })}></div></div>\n            <div className=\"bodypart-sub\">전주 대비 <span className={'bodypart-delta ' + (r.delta > 0 ? 'up' : r.delta < 0 ? 'down' : 'flat')}>{r.delta > 0 ? '▲' : r.delta < 0 ? '▼' : '−'} {Math.abs(Math.round(r.delta)).toLocaleString()}</span></div>\n          </div>\n        ))}\n        <div className=\"bodypart-card cardio\">\n          <div className=\"bodypart-head\">\n            <span className=\"bodypart-name\">🏃 유산소</span>\n            <span className={'bodypart-rate ' + bodypartProgress.cardio.tone}>{bodypartProgress.cardio.rate}%</span>\n          </div>\n          <div className=\"bodypart-main\">{Math.round(bodypartProgress.cardio.cur.minutes)}분<span className=\"bodypart-main-target\"> / {bodypartProgress.cardio.target.minutes}분</span></div>\n          <div className=\"bodypart-main\" style={CARDIO_KM_STYLE}>{(Math.round(bodypartProgress.cardio.cur.km * 10) / 10)}km<span className=\"bodypart-main-target\"> / {bodypartProgress.cardio.target.km}km</span></div>\n          <div className=\"bodypart-progress\"><div className={'bodypart-progress-fill ' + barTone(bodypartProgress.cardio.rate)} style={Object.assign({}, { width: `${Math.min(100, bodypartProgress.cardio.rate)}%` })}></div></div>\n          <div className=\"bodypart-sub\">전주 대비 분 <span className={'bodypart-delta ' + (bodypartProgress.cardio.deltaMin > 0 ? 'up' : bodypartProgress.cardio.deltaMin < 0 ? 'down' : 'flat')}>{bodypartProgress.cardio.deltaMin > 0 ? '▲' : bodypartProgress.cardio.deltaMin < 0 ? '▼' : '−'}{Math.abs(Math.round(bodypartProgress.cardio.deltaMin))}분</span> · km <span className={'bodypart-delta ' + (bodypartProgress.cardio.deltaKm > 0 ? 'up' : bodypartProgress.cardio.deltaKm < 0 ? 'down' : 'flat')}>{bodypartProgress.cardio.deltaKm > 0 ? '▲' : bodypartProgress.cardio.deltaKm < 0 ? '▼' : '−'}{Math.abs(Math.round(bodypartProgress.cardio.deltaKm * 10) / 10)}km</span></div>\n        </div>\n      </div>\n\n      <div className=\"card\">\n        <div className=\"card-title\">🎯 운동 목표 DB 기준 달성 현황</div>\n        <div className=\"card-sub\">선택 기간 내 완료 운동의 메인1·메인2 최대 Volume을 운동 목표 DB의 목표 Volume과 비교합니다.</div>\n        {goalStats.rows.length === 0 ? <div className=\"empty\">운동 목표 DB가 미설정이거나 목표 데이터가 없습니다.</div> : (\n          <div className=\"tbl-wrap\"><table>\n            <thead><tr><th>운동명</th><th className=\"right\">목표 Volume</th><th className=\"right\">실제 최대 Volume</th><th className=\"right\">달성률</th></tr></thead>\n            {/* [v1.9 D2] 운동 목표 row 클릭 → 운동 차트 탭 jump (handleVitalClick 재활용) */}\n            <tbody>{goalStats.rows.map(g => <tr key={g.id} onClick={() => handleVitalClick('workout')} style={CLICKABLE_STYLE} title={'클릭 시 운동 차트로 이동: ' + g.name}><td>{g.name}</td><td className=\"right\">{g.targetVolume || '−'}</td><td className=\"right\">{g.actual || '−'}</td><td className=\"right\">{g.targetVolume ? (\n              <div className=\"goal-rate-cell\">\n                <div className=\"goal-bar\"><div className={'goal-bar-fill ' + (g.rate >= 100 ? 'good' : g.rate >= 70 ? '' : g.rate >= 40 ? 'warn' : 'bad')} style={Object.assign({}, { width: `${clamp(g.rate, 0, 100)}%` })}></div></div>\n                <span className=\"goal-rate-text\">{g.rate}%</span>\n              </div>\n            ) : <span style={Object.assign({}, { color: '#94a3b8', fontStyle: 'italic' })}>목표 없음</span>}</td></tr>)}</tbody>\n          </table></div>\n        )}\n      </div>\n\n      {/* [M1+v1.5 F2] 회고 카드 — 라벨 명확화: 롤링 7일 윈도우임을 명시 */}\n      <div className=\"card\">\n        <div className=\"card-title\">📅 회고 — 최근 7일 vs 그 전 7일 (롤링 윈도우)</div>\n        <div className=\"card-sub\">오늘 기준 -7일 vs -8~-14일 비교 · \"이번주(월~일)\" 정확 비교는 위 KPI 카드 참고 · ▲▼ 운동·1RM·단백질 ↑ 좋음 / 칼로리·체중은 중립</div>\n        <div className=\"tbl-wrap\"><table>\n          <thead><tr><th>지표</th><th className=\"right\">최근 7일</th><th className=\"right\">그 전 7일</th><th className=\"right\">변화</th></tr></thead>\n          <tbody>\n            {[\n              { k:'운동 세션', t: weeklyReview.thisWeek.sessions, l: weeklyReview.lastWeek.sessions, unit:'회', up:'good' },\n              { k:'평균 칼로리', t: weeklyReview.thisWeek.avgKcal, l: weeklyReview.lastWeek.avgKcal, unit:'kcal', up:'neutral' },\n              { k:'평균 단백질', t: weeklyReview.thisWeek.avgProt, l: weeklyReview.lastWeek.avgProt, unit:'g', up:'good' },\n              { k:'메인1 최고 1RM', t: weeklyReview.thisWeek.maxOneRM, l: weeklyReview.lastWeek.maxOneRM, unit:'kg', up:'good' },\n              { k:'평균 체중', t: weeklyReview.thisWeek.avgWeight, l: weeklyReview.lastWeek.avgWeight, unit:'kg', up:'neutral' }\n            ].map(row => {\n              const t = row.t, l = row.l;\n              const delta = (t == null || l == null) ? null : Math.round((t - l) * 10) / 10;\n              const arrow = delta == null || delta === 0 ? '·' : delta > 0 ? '▲' : '▼';\n              // [v1.9 C3] ∆ 색상 토큰 적용 — inline color → className (CSS 시스템 통일, 다크모드 자동 적용)\n              const deltaClass = (delta == null || delta === 0) ? 'delta-flat' : (row.up === 'good' ? (delta > 0 ? 'delta-up-good' : 'delta-up-bad') : 'delta-neutral');\n              // [v1.9 D3] 회고 row 클릭 → 상세 모달 열기 (CLICKABLE_STYLE 재활용) — 주석은 return( 이전에 두어 JSX object-literal 오인식 회피\n              return (\n                <tr key={row.k} onClick={() => setSelectedReviewRow(row)} style={CLICKABLE_STYLE} title={row.k + ' 상세 보기'}>\n                  <td>{row.k}</td>\n                  <td className=\"right\">{t == null ? '−' : `${t}${row.unit}`}</td>\n                  <td className=\"right\">{l == null ? '−' : `${l}${row.unit}`}</td>\n                  <td className={'right ' + deltaClass}>{delta == null ? '−' : `${arrow} ${Math.abs(delta)}${row.unit}`}</td>\n                </tr>\n              );\n            })}\n          </tbody>\n        </table></div>\n      </div>\n\n      {/* [v1.9 D3] 회고 row 클릭 → 상세 모달 — overlay 클릭 / × 버튼으로 닫힘, modal-dialog 내 클릭은 버블링 중단 */}\n      {selectedReviewRow && (\n        <div className=\"modal-overlay\" onClick={() => setSelectedReviewRow(null)}>\n          <div className=\"modal-dialog\" onClick={e => e.stopPropagation()}>\n            <div className=\"modal-head\">\n              <div className=\"modal-title\">📊 {selectedReviewRow.k} 상세 분석</div>\n              <button className=\"modal-close\" onClick={() => setSelectedReviewRow(null)} aria-label=\"닫기\">×</button>\n            </div>\n            <div className=\"modal-body\">\n              <div className=\"modal-row\"><span className=\"modal-row-label\">지표</span><span className=\"modal-row-value\">{selectedReviewRow.k}</span></div>\n              <div className=\"modal-row\"><span className=\"modal-row-label\">최근 7일</span><span className=\"modal-row-value\">{selectedReviewRow.t == null ? '−' : `${selectedReviewRow.t}${selectedReviewRow.unit}`}</span></div>\n              <div className=\"modal-row\"><span className=\"modal-row-label\">그 전 7일</span><span className=\"modal-row-value\">{selectedReviewRow.l == null ? '−' : `${selectedReviewRow.l}${selectedReviewRow.unit}`}</span></div>\n              <div className=\"modal-row\"><span className=\"modal-row-label\">절대 변화</span><span className=\"modal-row-value\">{(selectedReviewRow.t == null || selectedReviewRow.l == null) ? '−' : `${(selectedReviewRow.t - selectedReviewRow.l) > 0 ? '▲' : (selectedReviewRow.t - selectedReviewRow.l) < 0 ? '▼' : '−'} ${Math.abs(Math.round((selectedReviewRow.t - selectedReviewRow.l) * 10) / 10)}${selectedReviewRow.unit}`}</span></div>\n              <div className=\"modal-row\"><span className=\"modal-row-label\">상대 변화</span><span className=\"modal-row-value\">{(selectedReviewRow.t == null || selectedReviewRow.l == null || selectedReviewRow.l === 0) ? '−' : `${Math.round((selectedReviewRow.t - selectedReviewRow.l) / selectedReviewRow.l * 100)}%`}</span></div>\n              <div className=\"modal-action\">💡 {reviewInsight(selectedReviewRow)}</div>\n            </div>\n          </div>\n        </div>\n      )}\n\n      <TargetSettingsCard targets={targets} setTargets={setTargets} currentWeight={currentWeight} />\n\n      {/* [v1.8 A1] BulkDietQuickInput 위치 이동 — 진단 흐름 끝, 입력/설정 영역으로 배치 */}\n      <BulkDietQuickInput diet={diet} activeTargets={activeTargets} />\n\n      <div className=\"section-divider\">\n        <div className=\"section-divider-title\">📈 추세 분석</div>\n        <div className=\"section-divider-sub\">선택 기간 {period}일 · 탭으로 영역 전환</div>\n      </div>\n      <div className=\"chart-tabs\">\n        {[\n          { id: 'workout', label: '🏋️ 운동', count: 6 },\n          { id: 'diet', label: '🍱 식단', count: 3 },\n          { id: 'body', label: '⚖️ 체성분', count: 1 },\n          { id: 'vitamin', label: '💊 비타민', count: vitaminWeekGrid.length }\n        ].map(t => (\n          <button key={t.id} className={'chart-tab' + (chartTab === t.id ? ' active' : '')} onClick={() => setChartTab(t.id)}>\n            <span>{t.label}</span><span className=\"chart-tab-count\">{t.count}</span>\n          </button>\n        ))}\n      </div>\n      {deferredChartTab === 'workout' && (\n        <div className=\"charts-grid\">\n          <div className=\"card\">\n            <div className=\"card-title\">📈 메인 운동 1 — 총 Volume 추이</div>\n            <div className=\"card-sub\">중량 × 세트 × 횟수 (체중 운동: 세트 × 횟수)</div>\n            <div className=\"chart-wrap\">\n              <ResponsiveContainer><LineChart data={main1Series}><CartesianGrid strokeDasharray=\"3 3\" stroke=\"#f1f5f9\" /><XAxis dataKey=\"date\" tick={TICK_STYLE} /><YAxis tick={TICK_STYLE} /><Tooltip /><Line type=\"monotone\" dataKey=\"volume\" stroke={PALETTE.orange} strokeWidth={2} dot={DOT_STYLE} /></LineChart></ResponsiveContainer>\n            </div>\n          </div>\n          <div className=\"card\">\n            <div className=\"card-title\">📈 메인 운동 2 — 총 Volume 추이</div>\n            <div className=\"card-sub\">보조 운동 누적 부피</div>\n            <div className=\"chart-wrap\">\n              <ResponsiveContainer><LineChart data={main2Series}><CartesianGrid strokeDasharray=\"3 3\" stroke=\"#f1f5f9\" /><XAxis dataKey=\"date\" tick={TICK_STYLE} /><YAxis tick={TICK_STYLE} /><Tooltip /><Line type=\"monotone\" dataKey=\"volume\" stroke={PALETTE.purple} strokeWidth={2} dot={DOT_STYLE} /></LineChart></ResponsiveContainer>\n            </div>\n          </div>\n          <div className=\"card\">\n            <div className=\"card-title\">🏃 유산소 거리 — 주별 합계</div>\n            <div className=\"card-sub\">월요일 기준 주차</div>\n            <div className=\"chart-wrap\">\n              <ResponsiveContainer><BarChart data={cardioWeekly}><CartesianGrid strokeDasharray=\"3 3\" stroke=\"#f1f5f9\" /><XAxis dataKey=\"week\" tick={TICK_STYLE} /><YAxis tick={TICK_STYLE} /><Tooltip /><Bar dataKey=\"km\" fill={PALETTE.green} radius={[4, 4, 0, 0]} /></BarChart></ResponsiveContainer>\n            </div>\n          </div>\n          <div className=\"card\">\n            <div className=\"card-title\">📈 기록 기반 다음 PR 도전 (메인1)</div>\n            <div className=\"card-sub\">운동기록_DB의 최신 1RM / 역대 최고 1RM × 1.05 기준</div>\n            <div className=\"chart-wrap\">\n              <ResponsiveContainer><RadialBarChart innerRadius=\"60%\" outerRadius=\"100%\" data={goalProgress} startAngle={90} endAngle={-270}><RadialBar dataKey=\"value\" cornerRadius={10} background /><Tooltip /></RadialBarChart></ResponsiveContainer>\n            </div>\n          </div>\n          <div className=\"card\">\n            <div className=\"card-title\">💪 메인 운동 1 — 추정 1RM</div>\n            <div className=\"card-sub\">Epley: 중량 × (1 + 횟수/30) · 일별 최고치</div>\n            <div className=\"chart-wrap\">\n              <ResponsiveContainer><LineChart data={main1OneRM}><CartesianGrid strokeDasharray=\"3 3\" stroke=\"#f1f5f9\" /><XAxis dataKey=\"date\" tick={TICK_STYLE} /><YAxis tick={TICK_STYLE} /><Tooltip /><Line type=\"monotone\" dataKey=\"oneRM\" stroke={PALETTE.pink} strokeWidth={2} dot={DOT_STYLE} /></LineChart></ResponsiveContainer>\n            </div>\n          </div>\n          <div className=\"card\">\n            <div className=\"card-title\">💪 메인 운동 2 — 추정 1RM</div>\n            <div className=\"card-sub\">Epley · 일별 최고치 (체중운동 제외)</div>\n            <div className=\"chart-wrap\">\n              <ResponsiveContainer><LineChart data={main2OneRM}><CartesianGrid strokeDasharray=\"3 3\" stroke=\"#f1f5f9\" /><XAxis dataKey=\"date\" tick={TICK_STYLE} /><YAxis tick={TICK_STYLE} /><Tooltip /><Line type=\"monotone\" dataKey=\"oneRM\" stroke={PALETTE.cyan} strokeWidth={2} dot={DOT_STYLE} /></LineChart></ResponsiveContainer>\n            </div>\n          </div>\n        </div>\n      )}\n      {deferredChartTab === 'diet' && (\n        <div className=\"charts-grid\">\n          <div className=\"card\">\n            <div className=\"card-title\">🍱 일일 칼로리 vs 목표</div>\n            <div className=\"card-sub\">린매스업 목표 {activeTargets.kcal} kcal · 빨간 점선 = 기준치</div>\n            <div className=\"chart-wrap\">\n              <ResponsiveContainer><LineChart data={calorieDaily}><CartesianGrid strokeDasharray=\"3 3\" stroke=\"#f1f5f9\" /><XAxis dataKey=\"date\" tick={TICK_STYLE} /><YAxis tick={TICK_STYLE} /><Tooltip /><ReferenceLine y={activeTargets.kcal} stroke={PALETTE.red} strokeDasharray=\"4 4\" label={{ value: `목표 ${activeTargets.kcal}`, position: 'insideTopRight', fontSize: 10, fill: PALETTE.red }} /><Line type=\"monotone\" dataKey=\"kcal\" stroke={PALETTE.indigo} strokeWidth={2} dot={DOT_STYLE} /></LineChart></ResponsiveContainer>\n            </div>\n          </div>\n          <div className=\"card\">\n            <div className=\"card-title\">🥧 PFC 비율 (일일 평균 kcal)</div>\n            <div className=\"card-sub\">탄수 4kcal/g · 단백 4kcal/g · 지방 9kcal/g</div>\n            <div className=\"chart-wrap\">\n              <ResponsiveContainer><PieChart><Pie data={pfc} dataKey=\"value\" innerRadius={50} outerRadius={80} label={(e) => `${e.name} ${e.value}`}>{pfc.map((_, i) => <Cell key={i} fill={PFC_COLORS[i]} />)}</Pie><Legend /></PieChart></ResponsiveContainer>\n            </div>\n          </div>\n          <div className=\"card\">\n            <div className=\"card-title\">🥩 일일 단백질 vs 목표</div>\n            <div className=\"card-sub\">린매스업 목표 {activeTargets.prot}g · 근육량 유지 핵심 지표</div>\n            <div className=\"chart-wrap\">\n              <ResponsiveContainer><LineChart data={proteinDaily}><CartesianGrid strokeDasharray=\"3 3\" stroke=\"#f1f5f9\" /><XAxis dataKey=\"date\" tick={TICK_STYLE} /><YAxis tick={TICK_STYLE} /><Tooltip /><ReferenceLine y={activeTargets.prot} stroke={PALETTE.red} strokeDasharray=\"4 4\" label={{ value: `목표 ${activeTargets.prot}g`, position: 'insideTopRight', fontSize: 10, fill: PALETTE.red }} /><Line type=\"monotone\" dataKey=\"prot\" stroke={PALETTE.cyan} strokeWidth={2} dot={DOT_STYLE} /></LineChart></ResponsiveContainer>\n            </div>\n          </div>\n        </div>\n      )}\n      {deferredChartTab === 'body' && (\n        <div className=\"charts-grid\">\n          <div className=\"card\">\n            <div className=\"card-title\">⚖️ 체중 추이</div>\n            <div className=\"card-sub\">식단 입력 시 체중(kg) — 일별 첫 측정값 (아침 권장)</div>\n            <div className=\"chart-wrap\">\n              <ResponsiveContainer><LineChart data={weightDaily}><CartesianGrid strokeDasharray=\"3 3\" stroke=\"#f1f5f9\" /><XAxis dataKey=\"date\" tick={TICK_STYLE} /><YAxis tick={TICK_STYLE} domain={['dataMin - 1', 'dataMax + 1']} /><Tooltip /><Line type=\"monotone\" dataKey=\"weight\" stroke={PALETTE.indigo} strokeWidth={2} dot={DOT_STYLE} /></LineChart></ResponsiveContainer>\n            </div>\n          </div>\n        </div>\n      )}\n      {deferredChartTab === 'vitamin' && (\n        <div className=\"card vitamin-week-card\">\n          <div className=\"card-title\">💊 비타민 7일 무누락 그리드 — {currentWeek.start} ~ {currentWeek.end}</div>\n          <div className=\"card-sub\">월~일 기준 · ✅ 완료 / ❌ 누락 / · 미래 (오늘 이후)</div>\n          {vitaminWeekGrid.length === 0 ? (\n            <div className=\"empty\">Vitamin_DB가 미설정이거나 일일기록 데이터가 없습니다.</div>\n          ) : (\n            <>\n              <div className=\"vitamin-week-head\">\n                <div className=\"vitamin-week-head-name\">비타민</div>\n                {weekDates.map(d => <div key={d}>{d.slice(5)}</div>)}\n              </div>\n              {vitaminWeekGrid.map(row => (\n                <div key={row.name} className=\"vitamin-week-row\">\n                  <div className=\"vitamin-week-name\">{row.name}</div>\n                  {row.cells.map(c => (\n                    <div key={c.date} className={'vitamin-cell ' + (!c.isPast ? 'future' : c.isDone ? 'done' : 'miss')}>\n                      {!c.isPast ? '·' : c.isDone ? '✅' : '❌'}\n                    </div>\n                  ))}\n                </div>\n              ))}\n              <div className=\"vitamin-week-summary\">\n                오늘까지 무누락 <strong>{vitaminHabitStats.perfectToDate}/{vitaminHabitStats.names}종</strong> · 7일 완주 <strong>{vitaminHabitStats.fullSeven}/{vitaminHabitStats.names}종</strong> · 누락 발견 <strong>{vitaminHabitStats.missed.length}종</strong>\n              </div>\n            </>\n          )}\n        </div>\n      )}\n    </div>\n  );\n}\n\n// =================== 운동 입력 ===================\nfunction WorkoutForm({ workouts, onSave, dbReady }) {\n  const [date, setDate] = useState(todayISO());\n  const [main1, setMain1] = useState('');\n  const [m1w, setM1w] = useState('');\n  const [m1s, setM1s] = useState('');\n  const [m1r, setM1r] = useState('');\n  const [main2, setMain2] = useState('');\n  const [m2w, setM2w] = useState('');\n  const [m2s, setM2s] = useState('');\n  const [m2r, setM2r] = useState('');\n  const [cardioKm, setCardioKm] = useState('');\n  const [cardioMin, setCardioMin] = useState('');\n  const [cardioSec, setCardioSec] = useState('');\n  const [phase, setPhase] = useState('매크로 A');\n  const [meso, setMeso] = useState('2주-축적');\n  const [extraParts, setExtraParts] = useState([]);\n  const [extraTypes, setExtraTypes] = useState([]);\n  const [note, setNote] = useState('');\n  const [saving, setSaving] = useState(false);\n\n  const autoParts = useMemo(() => {\n    const set = new Set(extraParts);\n    if (main1 && PART_MAP[main1]) PART_MAP[main1].forEach(p => set.add(p));\n    if (main2 && PART_MAP[main2]) PART_MAP[main2].forEach(p => set.add(p));\n    return [...set];\n  }, [main1, main2, extraParts]);\n  const autoTypes = useMemo(() => {\n    const set = new Set(extraTypes);\n    if (main1 || main2) set.add('근력');\n    if (cardioKm && Number(cardioKm) > 0) set.add('유산소');\n    if (set.size === 0) set.add('휴식');\n    return [...set];\n  }, [main1, main2, cardioKm, extraTypes]);\n  const cardioMinutes = useMemo(() => {\n    const m = Number(cardioMin || 0);\n    const s = Number(cardioSec || 0);\n    return Math.round((m + s / 60) * 100) / 100;\n  }, [cardioMin, cardioSec]);\n  const existing = useMemo(() => workouts.find(w => w.date === date), [workouts, date]);\n\n  // [Q1] existing 발견 시 폼 자동 채우기 — 빈 값으로 덮어쓰기 방지\n  useEffect(() => {\n    if (existing && !String(existing.id || '').startsWith('fb-')) {\n      setMain1(existing.main1 || '');\n      setM1w(existing.m1w == null ? '' : String(existing.m1w));\n      setM1s(existing.m1s == null ? '' : String(existing.m1s));\n      setM1r(existing.m1r == null ? '' : String(existing.m1r));\n      setMain2(existing.main2 || '');\n      setM2w(existing.m2w == null ? '' : String(existing.m2w));\n      setM2s(existing.m2s == null ? '' : String(existing.m2s));\n      setM2r(existing.m2r == null ? '' : String(existing.m2r));\n      setCardioKm(existing.cardio_km == null ? '' : String(existing.cardio_km));\n      const total = Number(existing.cardio_min) || 0;\n      const mInt = Math.floor(total);\n      const sInt = Math.round((total - mInt) * 60);\n      setCardioMin(total ? String(mInt) : '');\n      setCardioSec(sInt ? String(sInt) : '');\n      setPhase(existing.phase || '매크로 A');\n      setMeso(existing.meso || '2주-축적');\n      setNote(existing.note || '');\n    }\n  }, [existing?.id]);\n\n  const v1 = computeVolume(main1, Number(m1w), Number(m1s), Number(m1r));\n  const v2 = computeVolume(main2, Number(m2w), Number(m2s), Number(m2r));\n  const oneRM1 = computeOneRM(main1, Number(m1w), Number(m1r));\n  const oneRM2 = computeOneRM(main2, Number(m2w), Number(m2r));\n\n  const reset = () => { setMain1(''); setM1w(''); setM1s(''); setM1r(''); setMain2(''); setM2w(''); setM2s(''); setM2r(''); setCardioKm(''); setCardioMin(''); setCardioSec(''); setNote(''); setExtraParts([]); setExtraTypes([]); };\n\n  const submit = async () => {\n    if (!main1 && !main2 && !cardioKm) { onSave({ kind:'error', msg:'최소 1개 항목 입력 (메인1 / 메인2 / 유산소)' }); return; }\n    setSaving(true);\n    const props = {\n      '운동명': propTitle(`🏋🏼 ${date}`),\n      'Work out date': propDate(date),\n      '상태': propStatus('완료'),\n      '매크로 페이즈': propSelect(phase),\n      '메조 주차': propSelect(meso),\n      '부위': propMulti(autoParts),\n      '운동유형': propMulti(autoTypes)\n    };\n    if (main1) { props['메인 운동 1'] = propSelect(main1); props['메인 운동 1 중량(kg)'] = propNumber(m1w); props['메인 운동 1 세트'] = propNumber(m1s); props['메인 운동 1 횟수'] = propNumber(m1r); }\n    if (main2) { props['메인 운동 2'] = propSelect(main2); props['메인 운동 2 중량(kg)'] = propNumber(m2w); props['메인 운동 2 세트'] = propNumber(m2s); props['메인 운동 2 횟수'] = propNumber(m2r); }\n    if (cardioKm) { props['유산소 거리(km)'] = propNumber(cardioKm); props['유산소 시간(분)'] = propNumber(cardioMinutes); }\n    if (note) props['세부 기록'] = propText(note);\n    const result = await onSave({ kind:'submit', existing, props, date });\n    setSaving(false);\n    if (result?.ok) reset();\n  };\n\n  return (\n    <div>\n      <h2 className=\"section-title\">🏋️ 운동 입력</h2>\n      <p className=\"section-sub\">{existing ? <strong>{date} 기록 있음 — 기존 값 자동 채움 + 업데이트 (일일 1건 원칙)</strong> : `${date} 신규 기록 생성`}</p>\n\n      <div className=\"card\">\n        <div className=\"form-grid\">\n          <div className=\"field\"><label>날짜</label><input type=\"date\" value={date} onChange={e => setDate(e.target.value)} /></div>\n          <div className=\"field\"><label>매크로 페이즈 / 메조 주차</label>\n            <div className=\"field-row two\">\n              <select value={phase} onChange={e => setPhase(e.target.value)}>{MACRO_PHASES.map(p => <option key={p} value={p}>{p}</option>)}</select>\n              <select value={meso} onChange={e => setMeso(e.target.value)}>{MESO_WEEKS.map(p => <option key={p} value={p}>{p}</option>)}</select>\n            </div>\n          </div>\n        </div>\n      </div>\n\n      <div className=\"card\">\n        <div className=\"card-title\">메인 운동 1</div>\n        <div className=\"field\"><label>운동</label><select value={main1} onChange={e => setMain1(e.target.value)}><option value=\"\">선택 안 함</option>{MAIN1_OPTS.map(o => <option key={o} value={o}>{o}</option>)}</select></div>\n        <div className=\"field-row\">\n          <div className=\"field\"><label>중량 (kg)</label><input type=\"number\" inputMode=\"decimal\" step=\"0.5\" value={m1w} onChange={e => setM1w(e.target.value)} /></div>\n          <div className=\"field\"><label>세트</label><input type=\"number\" inputMode=\"numeric\" value={m1s} onChange={e => setM1s(e.target.value)} /></div>\n          <div className=\"field\"><label>횟수</label><input type=\"number\" inputMode=\"numeric\" value={m1r} onChange={e => setM1r(e.target.value)} /></div>\n        </div>\n        {(v1 > 0 || oneRM1 > 0) && <div className=\"preview-box\">{v1 > 0 && <div className=\"row\"><span className=\"lbl\">총 Volume</span><span className=\"val\">{v1}</span></div>}{oneRM1 > 0 && <div className=\"row\"><span className=\"lbl\">추정 1RM</span><span className=\"val\">{oneRM1} kg</span></div>}</div>}\n      </div>\n\n      <div className=\"card\">\n        <div className=\"card-title\">메인 운동 2</div>\n        <div className=\"field\"><label>운동</label><select value={main2} onChange={e => setMain2(e.target.value)}><option value=\"\">선택 안 함</option>{MAIN2_OPTS.map(o => <option key={o} value={o}>{o}</option>)}</select></div>\n        <div className=\"field-row\">\n          <div className=\"field\"><label>중량 (kg)</label><input type=\"number\" inputMode=\"decimal\" step=\"0.5\" value={m2w} onChange={e => setM2w(e.target.value)} /></div>\n          <div className=\"field\"><label>세트</label><input type=\"number\" inputMode=\"numeric\" value={m2s} onChange={e => setM2s(e.target.value)} /></div>\n          <div className=\"field\"><label>횟수</label><input type=\"number\" inputMode=\"numeric\" value={m2r} onChange={e => setM2r(e.target.value)} /></div>\n        </div>\n        {(v2 > 0 || oneRM2 > 0) && <div className=\"preview-box\">{v2 > 0 && <div className=\"row\"><span className=\"lbl\">총 Volume</span><span className=\"val\">{v2}</span></div>}{oneRM2 > 0 && <div className=\"row\"><span className=\"lbl\">추정 1RM</span><span className=\"val\">{oneRM2} kg</span></div>}</div>}\n      </div>\n\n      <div className=\"card\">\n        <div className=\"card-title\">🏃 유산소</div>\n        <div className=\"field-row\">\n          <div className=\"field\"><label>거리 (km)</label><input type=\"number\" inputMode=\"decimal\" step=\"0.1\" value={cardioKm} onChange={e => setCardioKm(e.target.value)} /></div>\n          <div className=\"field\"><label>분</label><input type=\"number\" inputMode=\"numeric\" value={cardioMin} onChange={e => setCardioMin(e.target.value)} /></div>\n          <div className=\"field\"><label>초</label><input type=\"number\" inputMode=\"numeric\" value={cardioSec} onChange={e => setCardioSec(e.target.value)} /></div>\n        </div>\n        {cardioKm && <div className=\"preview-box\"><div className=\"row\"><span className=\"lbl\">시간 변환</span><span className=\"val\">{cardioMinutes}분</span></div></div>}\n      </div>\n\n      <div className=\"card\">\n        <div className=\"card-title\">🤖 자동 매핑 (편집 가능)</div>\n        <div className=\"field\"><label>부위 (메인 운동에서 자동 추출)</label>\n          <div className=\"chips\">{BODY_PARTS.map(p => { const on = autoParts.includes(p); return <span key={p} className={'chip-opt' + (on ? ' on' : '')} onClick={() => setExtraParts(s => on ? s.filter(x => x !== p) : [...s, p])}>{p}</span>; })}</div>\n        </div>\n        <div className=\"field\"><label>운동유형</label>\n          <div className=\"chips\">{WORKOUT_TYPES.map(t => { const on = autoTypes.includes(t); return <span key={t} className={'chip-opt' + (on ? ' on' : '')} onClick={() => setExtraTypes(s => on ? s.filter(x => x !== t) : [...s, t])}>{t}</span>; })}</div>\n        </div>\n        <div className=\"field\"><label>세부 기록 (옵션 외 운동 / 세트별 원본 / 메모)</label><textarea value={note} onChange={e => setNote(e.target.value)} placeholder=\"예: 워밍업 40×10, 60×8 4세트\" /></div>\n      </div>\n\n      <div className=\"btn-row\">\n        <button className=\"btn secondary\" onClick={reset}>초기화</button>\n        <button className=\"btn primary\" onClick={submit} disabled={saving}>{saving ? '저장 중...' : (existing ? '오늘 기록 업데이트' : '운동 기록 저장')}</button>\n      </div>\n      {!dbReady && <p className=\"section-sub right\">* WORKOUT_DB_ID 미입력 — 화면 미리보기만 동작 (실제 노션 저장 X)</p>}\n    </div>\n  );\n}\n\n// =================== 식단 입력 ===================\nfunction DietForm({ onSave, dbReady, targets, diet }) {\n  const [date, setDate] = useState(todayISO());\n  const [composition, setComposition] = useState('');\n  const [kcal, setKcal] = useState('');\n  const [carb, setCarb] = useState('');\n  const [prot, setProt] = useState('');\n  const [fat, setFat] = useState('');\n  const [weight, setWeight] = useState('');\n  const autoSlot = useMemo(() => {\n    const h = new Date().getHours();\n    if (h >= 6 && h < 11) return '오전';\n    if (h >= 11 && h < 17) return '오후';\n    return '퇴근';\n  }, []);\n  const [slot, setSlot] = useState(autoSlot);\n  const [saving, setSaving] = useState(false);\n  // [M3] 어제 같은 시간대 식단 — \"어제와 동일\" 1-tap 복사\n  const yesterdaySame = useMemo(() => {\n    if (!diet) return null;\n    const y = toKstDate(new Date(Date.now() - 86400000));\n    return diet.find(d => d.date === y && d.slot === slot) || null;\n  }, [diet, slot]);\n  const copyYesterday = () => {\n    if (!yesterdaySame) return;\n    setComposition(yesterdaySame.composition || '');\n    setKcal(yesterdaySame.kcal ? String(yesterdaySame.kcal) : '');\n    setCarb(yesterdaySame.carb ? String(yesterdaySame.carb) : '');\n    setProt(yesterdaySame.prot ? String(yesterdaySame.prot) : '');\n    setFat(yesterdaySame.fat ? String(yesterdaySame.fat) : '');\n  };\n  const reset = () => { setComposition(''); setKcal(''); setCarb(''); setProt(''); setFat(''); setWeight(''); };\n  const submit = async () => {\n    if (!composition && !kcal && !weight) { onSave({ kind:'error', msg:'구성 / 칼로리 / 체중 중 1개 이상 입력' }); return; }\n    setSaving(true);\n    const slotEmoji = { '오전':'🍳', '오후':'🍱', '퇴근':'🥗' }[slot] || '🍱';\n    const props = {\n      '식단명': propTitle(`${slotEmoji} ${date} ${slot}`),\n      '구성': propText(composition),\n      '칼로리': propNumber(kcal),\n      '탄수화물': propNumber(carb),\n      '단백질_g': propNumber(prot),\n      '지방': propNumber(fat),\n      '날짜': propDate(date),\n      '오전/오후/퇴근': propSelect(slot),\n      '유형': propSelect('일일기록'),\n      '상태': propStatus('완료')\n    };\n    if (weight) props['체중(kg)'] = propNumber(weight);\n    const result = await onSave({
